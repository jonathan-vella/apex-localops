title: Foundry Local for Microsoft Sovereign Private Clouds # < 60 chars
summary: Deploy and run AI inference workloads on Azure Local with Arc-enabled Kubernetes. Use OpenAI-compatible APIs with your AI models while keeping data on-premises. # < 160 chars

