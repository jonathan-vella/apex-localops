name: Documentation issue
description: Report an error, gap, or unclear section in the docs.
labels: ["documentation", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for documentation problems — wrong commands, broken links, missing steps, or
        anything unclear. For a code or deployment bug, use the Bug report template instead.
  - type: input
    id: location
    attributes:
      label: Page or section
      description: The doc path and heading, if you know it.
      placeholder: docs/sff/quickstart.md → "4. Stage the ROE ISO and Configurator App"
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Type of issue
      options:
        - Incorrect or outdated information
        - Missing information / gap
        - Unclear or confusing
        - Broken link
        - Typo / formatting
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What is wrong, and what would make it correct or clearer?
    validations:
      required: true
