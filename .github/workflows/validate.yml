name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bicep:
    name: Bicep build + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Bicep build (compile)
        run: az bicep build --file infra/bicep/azlocal-js/main.bicep --stdout > /dev/null

      - name: Bicep lint
        run: |
          # Fail the job if the linter emits any Error-level diagnostics.
          az bicep lint --file infra/bicep/azlocal-js/main.bicep 2> lint.txt || true
          cat lint.txt
          if grep -qiE "Error( |:|s)" lint.txt; then
            echo "::error::Bicep lint reported errors"
            exit 1
          fi

      - name: Bicep build (SFF profile)
        run: az bicep build --file infra/bicep/azlocal-sff/main.bicep --stdout > /dev/null

      - name: Bicep lint (SFF profile)
        run: |
          # Fail the job if the linter emits any Error-level diagnostics.
          az bicep lint --file infra/bicep/azlocal-sff/main.bicep 2> lint-sff.txt || true
          cat lint-sff.txt
          if grep -qiE "Error( |:|s)" lint-sff.txt; then
            echo "::error::Bicep lint reported errors (SFF profile)"
            exit 1
          fi

      - name: Bicep build (AKS on bare metal)
        run: az bicep build --file infra/bicep/aks-baremetal/main.bicep --stdout > /dev/null

      - name: Bicep lint (AKS on bare metal)
        run: |
          # Fail the job if the linter emits any Error-level diagnostics.
          az bicep lint --file infra/bicep/aks-baremetal/main.bicep 2> lint-aksbm.txt || true
          cat lint-aksbm.txt
          if grep -qiE "Error( |:|s)" lint-aksbm.txt; then
            echo "::error::Bicep lint reported errors (AKS on bare metal)"
            exit 1
          fi

  shell:
    name: Shell script checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Syntax check (bash -n)
        run: |
          for s in scripts/*.sh; do
            bash -n "$s" && echo "ok: $s"
          done

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./scripts
          severity: warning

  skills:
    name: Custom skill validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate custom skills (frontmatter + docs/upstream references)
        run: ./scripts/validate-skills.sh

  docs:
    name: Docs lint + link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: markdownlint (owned docs)
        # Config + ignores live in .markdownlint-cli2.jsonc (vendored mirrors and
        # internal plans excluded). Version-pinned for reproducibility.
        run: npx --yes markdownlint-cli2@0.14.0 "docs/**/*.md" "README.md" "CHANGELOG.md" "ATTRIBUTION.md"

      - name: Relative link check (owned docs)
        # Validates every relative markdown link resolves to a real path. Offline by
        # design: external URLs and in-page anchors are skipped. Vendored mirrors and
        # internal planning docs are out of scope.
        run: |
          fail=0
          while IFS= read -r f; do
            dir=$(dirname "$f")
            while IFS= read -r link; do
              case "$link" in http*|'#'*|mailto:*) continue ;; esac
              target="${link%%#*}"
              [ -z "$target" ] && continue
              if [ ! -e "$(realpath -m "$dir/$target")" ]; then
                echo "::error file=$f::broken relative link -> $link"
                fail=1
              fi
            done < <(grep -oE '\]\([^)]+\)' "$f" | sed -E 's/^\]\(//; s/\)$//')
          done < <(git ls-files 'docs/**/*.md' 'README.md' 'CHANGELOG.md' 'ATTRIBUTION.md' \
            | grep -vE '^docs/upstream/|^docs/azure-local-sff/upstream/|^docs/plans/')
          exit $fail
